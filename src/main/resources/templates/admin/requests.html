<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('درخواست‌های قصه‌گویی')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <h1 class="h3 mb-4">🎙️ درخواست‌های قصه‌گویی</h1>

    <div class="alert alert-success" th:if="${success != null}" th:text="${success}">انجام شد</div>

    <div class="alert alert-info" th:if="${#lists.isEmpty(requests)}">درخواستی ثبت نشده است.</div>

    <div class="row g-4" th:unless="${#lists.isEmpty(requests)}">
        <div class="col-md-6" th:each="req : ${requests}">
            <div class="card p-4 h-100">
                <div class="d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <div class="fw-bold" th:text="${req.user.displayName}">نام</div>
                        <div class="text-muted small" dir="ltr" th:text="${req.user.username}">username</div>
                    </div>
                    <span class="badge" th:classappend="'text-bg-' + ${req.status.badgeClass}"
                          th:text="${req.status.persianName}">وضعیت</span>
                </div>
                <p class="text-muted small mb-2" th:text="'📅 ' + ${@persianDate.format(req.createdAt)}">تاریخ</p>
                <p th:if="${req.message != null}" class="bg-light rounded-3 p-2 small"
                   th:text="${req.message}">پیام</p>
                <p th:if="${req.adminNote != null}" class="small">
                    یادداشت مدیر: <span th:text="${req.adminNote}">یادداشت</span>
                </p>

                <div th:if="${req.status.name() == 'PENDING'}" class="mt-auto">
                    <form th:action="@{'/admin/requests/' + ${req.id} + '/approve'}" method="post" class="mb-2">
                        <button type="submit" class="btn btn-success w-100">✔ پذیرفتن — قصه‌گو شود</button>
                    </form>
                    <form th:action="@{'/admin/requests/' + ${req.id} + '/reject'}" method="post">
                        <div class="input-group">
                            <input type="text" class="form-control" name="note"
                                   placeholder="دلیل رد (دلخواه)">
                            <button type="submit" class="btn btn-outline-danger">✖ رد</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
