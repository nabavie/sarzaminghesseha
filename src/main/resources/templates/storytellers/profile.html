<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${'قصه‌های ' + storyteller.displayName})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <section class="storyteller-hero card p-4 p-md-5 mb-5">
        <div class="d-flex flex-wrap align-items-center gap-4">
            <img th:if="${storyteller.avatarPath != null and !#strings.isEmpty(storyteller.avatarPath)}"
                 th:src="@{'/media/avatars/' + ${storyteller.avatarPath}}"
                 class="storyteller-avatar-lg" th:alt="'تصویر ' + ${storyteller.displayName}">
            <div th:unless="${storyteller.avatarPath != null and !#strings.isEmpty(storyteller.avatarPath)}"
                 class="storyteller-avatar-lg-placeholder" aria-hidden="true">🎙️</div>
            <div class="flex-grow-1">
                <p class="text-muted mb-1 small">قصه‌گو</p>
                <h1 class="h2 mb-2" th:text="${storyteller.displayName}">نام قصه‌گو</h1>
                <p class="mb-0">
                    <span th:text="${@persianDate.digits(taleCount)}">۰</span>
                    قصهٔ صوتی منتشرشده
                </p>
            </div>
        </div>
    </section>

    <h2 class="h4 mb-4">قصه‌های این قصه‌گو</h2>

    <div class="alert alert-light border" th:if="${talesPage.isEmpty()}">
        هنوز قصه‌ای از این قصه‌گو منتشر نشده است.
    </div>

    <div class="row g-4" th:unless="${talesPage.isEmpty()}">
        <div class="col-sm-6 col-lg-4 col-xl-3" th:each="tale : ${talesPage.content}">
            <a th:href="@{'/tales/' + ${tale.id}}" class="text-decoration-none text-reset">
                <div class="card tale-card">
                    <img th:if="${tale.coverPath != null}" th:src="@{'/media/covers/' + ${tale.coverPath}}"
                         class="tale-cover" alt="تصویر قصه">
                    <div th:if="${tale.coverPath == null}" class="tale-cover-placeholder">📖</div>
                    <div class="card-body">
                        <h3 class="h6 card-title fw-bold" th:text="${tale.title}">عنوان</h3>
                        <div>
                            <span class="badge text-bg-light border me-1" th:each="cat : ${tale.categories}"
                                  th:text="${cat.name}">دسته</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <nav class="mt-5" th:if="${talesPage.totalPages > 1}" aria-label="صفحه‌ها">
        <ul class="pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend="${talesPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{'/storytellers/' + ${storyteller.id}(page=${talesPage.number - 1})}">قبلی</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(pageWindowStart, pageWindowEnd)}"
                th:classappend="${i == talesPage.number} ? 'active'">
                <a class="page-link" th:href="@{'/storytellers/' + ${storyteller.id}(page=${i})}"
                   th:text="${@persianDate.digits(i + 1)}">۱</a>
            </li>
            <li class="page-item" th:classappend="${talesPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{'/storytellers/' + ${storyteller.id}(page=${talesPage.number + 1})}">بعدی</a>
            </li>
        </ul>
    </nav>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
