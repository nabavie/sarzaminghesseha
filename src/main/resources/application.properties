# Server
server.port=9095
# Reverse proxy (nginx): trust X-Forwarded-For / X-Forwarded-Proto so the app sees the
# real client IP (login rate-limiting) and scheme (https redirects). Tomcat's RemoteIpValve
# only honors these headers when the direct peer is a private/loopback address, so external
# clients cannot spoof their IP. nginx must send:
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#   proxy_set_header Host $host;
server.forward-headers-strategy=native

