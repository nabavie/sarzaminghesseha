# Production profile (activated by SPRING_PROFILES_ACTIVE=prod).
# Secrets come from the container environment / .env — do not hardcode them here.

server.port=${SERVER_PORT:8081}

# MySQL (compose service name "db")
spring.datasource.url=jdbc:mysql://db:3306/${DB_NAME:qesseha}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_persian_ci
spring.datasource.username=${DB_USERNAME:qesseha}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Safer than ddl-auto=update once the schema is stable
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Template caching (off in default/dev application.properties)
spring.thymeleaf.cache=true

# Gzip responses from the app (Traefik may also compress; either is fine)
server.compression.enabled=true
server.compression.min-response-size=1024
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json,image/svg+xml,application/xml

# Long-lived browser cache for classpath static assets (/css, /js, /fonts, /vendor, /img)
spring.web.resources.cache.cachecontrol.max-age=30d
spring.web.resources.cache.cachecontrol.cache-public=true

# Session cookie hardening behind HTTPS
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Public URL + secrets from compose/.env
app.public-base-url=${PUBLIC_BASE_URL:https://sarzaminghesseha.com}
app.media.token-secret=${MEDIA_TOKEN_SECRET:}
app.upload.dir=/app/uploads

app.seed.admin-username=${SEED_ADMIN_USERNAME:admin}
app.seed.admin-password=${SEED_ADMIN_PASSWORD}
app.seed.test-admin-username=${SEED_TEST_ADMIN_USERNAME:testadmin}
app.seed.test-admin-password=${SEED_TEST_ADMIN_PASSWORD:}
app.seed.storyteller-password=${SEED_STORYTELLER_PASSWORD:}
