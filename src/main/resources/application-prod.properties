# Production profile (activated via SPRING_PROFILES_ACTIVE=prod in docker-compose).
# All secrets come from environment variables injected by docker-compose (.env file).

# MySQL runs as the "db" service on the compose-internal network; the database and
# the app user are created by the mysql image itself (MYSQL_DATABASE / MYSQL_USER),
# so no createDatabaseIfNotExist and no root account here.
spring.datasource.url=jdbc:mysql://db:3306/${DB_NAME:qesseha}?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_persian_ci
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# No SQL logging in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Cache templates (dev leaves this off for live-reload)
spring.thymeleaf.cache=true

# Session cookie hardening: TLS terminates at Traefik, X-Forwarded-Proto makes the
# app see https (forward-headers-strategy=native in the base properties), but set
# the flags explicitly so a misconfigured proxy can never leak the cookie over http.
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Uploads live on a named docker volume mounted at /app/uploads
app.upload.dir=/app/uploads

# Seed accounts: same demo users as dev, but passwords MUST be provided via env
# (no defaults here on purpose - the app fails to start if they are missing).
app.seed.admin-password=${SEED_ADMIN_PASSWORD}
app.seed.test-admin-password=${SEED_TEST_ADMIN_PASSWORD}
app.seed.storyteller-password=${SEED_STORYTELLER_PASSWORD}

# Fixed HMAC secret so audio-stream tokens survive app restarts
app.media.token-secret=${MEDIA_TOKEN_SECRET}
