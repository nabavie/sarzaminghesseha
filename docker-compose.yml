# Production stack for sarzaminghesseha.com (primary) + sarzaminghesseha.ir (301 → .com)
#   traefik  - reverse proxy, terminates TLS with free Let's Encrypt certs (auto-renewed)
#   app      - the Spring Boot application (built from the local Dockerfile)
#   db       - MySQL 8, reachable only on the compose-internal network (no host port)
#
# Secrets/config come from a .env file next to this compose file (see .env.example).
# Usage: docker compose up -d --build

services:
  traefik:
    # Newer v3 releases negotiate the Docker API version; older tags pin API 1.24,
    # which modern Docker Engines reject ("client version 1.24 is too old")
    image: traefik:v3.6
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      # Port 80 only serves ACME challenges and redirects everything else to https
      - --entrypoints.web.address=:80
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --entrypoints.websecure.address=:443
      # Free Let's Encrypt certificates, renewed automatically before expiry
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --log.level=INFO
      # Long audio uploads on slow connections: Traefik's default ~60s read timeout
      # causes 504 Gateway Timeout before Spring finishes receiving the multipart body.
      - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=600s
      - --entrypoints.websecure.transport.respondingTimeouts.writeTimeout=600s
      - --entrypoints.websecure.transport.respondingTimeouts.idleTimeout=180s
      - --entrypoints.web.transport.respondingTimeouts.readTimeout=600s
      - --entrypoints.web.transport.respondingTimeouts.writeTimeout=600s
      - --entrypoints.web.transport.respondingTimeouts.idleTimeout=180s
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Read-only docker socket: Traefik only needs to discover containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    networks:
      - web

  app:
    build: .
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_NAME: ${DB_NAME:-qesseha}
      DB_USERNAME: ${DB_USERNAME:-qesseha}
      DB_PASSWORD: ${DB_PASSWORD}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_TEST_ADMIN_PASSWORD: ${SEED_TEST_ADMIN_PASSWORD}
      SEED_STORYTELLER_PASSWORD: ${SEED_STORYTELLER_PASSWORD}
      MEDIA_TOKEN_SECRET: ${MEDIA_TOKEN_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://sarzaminghesseha.com}
      SERVER_PORT: 8081
      # Belt-and-suspenders if the prod profile file is missing from an older image
      SPRING_THYMELEAF_CACHE: "true"
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SERVER_COMPRESSION_ENABLED: "true"
      SERVER_SERVLET_SESSION_COOKIE_SECURE: "true"
      SERVER_SERVLET_SESSION_COOKIE_HTTP_ONLY: "true"
      SERVER_SERVLET_SESSION_COOKIE_SAME_SITE: lax
    volumes:
      # User-uploaded audio/covers/avatars survive redeploys
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - web
      - internal
    labels:
      - traefik.enable=true
      # The app is on two networks; without this Traefik may try to reach it
      # over "internal" (which Traefik isn't on) and time out.
      - traefik.docker.network=myapp_web
      # Primary domain (SEO canonical host)
      - "traefik.http.routers.qesseha.rule=Host(`sarzaminghesseha.com`)"
      - traefik.http.routers.qesseha.entrypoints=websecure
      - traefik.http.routers.qesseha.tls.certresolver=letsencrypt
      - "traefik.http.routers.qesseha.tls.domains[0].main=sarzaminghesseha.com"
      - traefik.http.services.qesseha.loadbalancer.server.port=8081
      # Security headers (soft / non-breaking)
      - traefik.http.middlewares.qesseha-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.qesseha-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.qesseha-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.qesseha-headers.headers.frameDeny=true
      - traefik.http.middlewares.qesseha-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.qesseha-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      # Gzip at the edge for HTML/CSS/JS (safe; complements Spring compression)
      - traefik.http.middlewares.qesseha-compress.compress=true
      - traefik.http.routers.qesseha.middlewares=qesseha-headers,qesseha-compress
      # Secondary domain: permanent redirect to .com (consolidates SEO signals)
      - "traefik.http.routers.qesseha-ir.rule=Host(`sarzaminghesseha.ir`)"
      - traefik.http.routers.qesseha-ir.entrypoints=websecure
      - traefik.http.routers.qesseha-ir.tls.certresolver=letsencrypt
      - "traefik.http.routers.qesseha-ir.tls.domains[0].main=sarzaminghesseha.ir"
      - traefik.http.routers.qesseha-ir.service=qesseha
      - "traefik.http.middlewares.qesseha-ir-redirect.redirectregex.regex=^https://sarzaminghesseha\\.ir(.*)"
      - "traefik.http.middlewares.qesseha-ir-redirect.redirectregex.replacement=https://sarzaminghesseha.com$${1}"
      - "traefik.http.middlewares.qesseha-ir-redirect.redirectregex.permanent=true"
      - traefik.http.routers.qesseha-ir.middlewares=qesseha-ir-redirect,qesseha-headers,qesseha-compress

  db:
    image: mysql:8.4
    restart: unless-stopped
    # Match the collation the app expects for Persian text
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_persian_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-qesseha}
      MYSQL_USER: ${DB_USERNAME:-qesseha}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      # -h 127.0.0.1 forces TCP so the check ignores mysql's init-phase temp server
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - internal

networks:
  web:
  internal:
    # No route to the outside world; only app <-> db traffic
    internal: true

volumes:
  letsencrypt:
  mysql-data:
  uploads:
