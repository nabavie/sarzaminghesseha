<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('ثبت‌نام')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
            <div class="card p-4 p-md-5">
                <h1 class="h3 text-center mb-2">🌟 عضویت در سرزمین قصه‌ها</h1>
                <p class="text-center text-muted mb-4">ثبت‌نام ساده است؛ فقط چند لحظه وقت می‌گیرد.</p>

                <form th:action="@{/register}" th:object="${form}" method="post">
                    <div class="mb-3">
                        <label for="displayName" class="form-label fw-bold">نام شما</label>
                        <input type="text" class="form-control form-control-lg" id="displayName"
                               th:field="*{displayName}" th:classappend="${#fields.hasErrors('displayName')} ? 'is-invalid'"
                               placeholder="مثلاً: مادربزرگ فاطمه">
                        <div class="invalid-feedback" th:errors="*{displayName}"></div>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label fw-bold">نام کاربری</label>
                        <input type="text" class="form-control form-control-lg" id="username" dir="ltr"
                               th:field="*{username}" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                               autocomplete="username" placeholder="ali123">
                        <div class="invalid-feedback" th:errors="*{username}"></div>
                        <div class="form-text">با حروف انگلیسی؛ برای ورود به حساب استفاده می‌شود.</div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label fw-bold">رمز عبور</label>
                        <input type="password" class="form-control form-control-lg" id="password"
                               th:field="*{password}" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                               autocomplete="new-password" data-password-rules="passwordRules">
                        <div class="invalid-feedback" th:errors="*{password}"></div>
                        <ul class="list-unstyled small mt-2 mb-0" id="passwordRules">
                            <li class="text-muted" data-rule="length"><span class="rule-mark">✖</span> دست‌کم ۸ کاراکتر</li>
                            <li class="text-muted" data-rule="letter"><span class="rule-mark">✖</span> دست‌کم یک حرف</li>
                            <li class="text-muted" data-rule="digit"><span class="rule-mark">✖</span> دست‌کم یک عدد</li>
                        </ul>
                    </div>
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label fw-bold">تکرار رمز عبور</label>
                        <input type="password" class="form-control form-control-lg" id="confirmPassword"
                               th:field="*{confirmPassword}" th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                               autocomplete="new-password">
                        <div class="invalid-feedback" th:errors="*{confirmPassword}"></div>
                    </div>

                    <div class="form-check form-switch mb-4 p-3 pe-5 bg-light rounded-3">
                        <input class="form-check-input" type="checkbox" id="storyteller" th:field="*{storyteller}">
                        <label class="form-check-label" for="storyteller">
                            <strong>🎙️ قصه‌گو هستم</strong>
                            <div class="small text-muted">می‌خواهم قصه‌هایم را با صدای خودم برای بچه‌ها منتشر کنم</div>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-warm btn-big w-100">ثبت‌نام</button>
                </form>

                <p class="text-center mt-4 mb-0">
                    قبلاً عضو شده‌اید؟
                    <a th:href="@{/login}" class="fw-bold">وارد شوید</a>
                </p>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script th:src="@{/js/password-rules.js}"></script>
</body>
</html>
