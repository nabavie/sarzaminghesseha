<!DOCTYPE html>
<html lang="fa" dir="rtl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('همهٔ قصه‌ها')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="container py-5">
    <h1 class="h3 mb-4">📚 قصه‌های سرزمین</h1>

    <form th:action="@{/tales}" method="get" class="row g-2 mb-3">
        <div class="col-md-6 col-lg-5">
            <input type="search" name="q" class="form-control form-control-lg" th:value="${q}"
                   placeholder="دنبال چه قصه‌ای می‌گردی؟">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary btn-lg px-4">جست‌وجو</button>
        </div>
    </form>

    <div class="mb-4">
        <a th:href="@{/tales(q=${q})}" class="category-chip"
           th:classappend="${selectedCategory == null} ? 'active'">همه</a>
        <a th:each="cat : ${categories}" th:href="@{/tales(q=${q}, category=${cat.id})}"
           class="category-chip" th:classappend="${selectedCategory == cat.id} ? 'active'"
           th:text="${cat.name}">دسته</a>
    </div>

    <div class="alert alert-info" th:if="${talesPage.isEmpty()}">
        قصه‌ای پیدا نشد. کلمهٔ دیگری را امتحان کن! 🌈
    </div>

    <div class="row g-4" th:unless="${talesPage.isEmpty()}">
        <div class="col-sm-6 col-lg-4 col-xl-3" th:each="tale : ${talesPage.content}">
            <a th:href="@{'/tales/' + ${tale.id}}" class="text-decoration-none text-reset">
                <div class="card tale-card">
                    <img th:if="${tale.coverPath != null}" th:src="@{'/media/covers/' + ${tale.coverPath}}"
                         class="tale-cover" alt="تصویر قصه">
                    <div th:if="${tale.coverPath == null}" class="tale-cover-placeholder">📖</div>
                    <div class="card-body">
                        <h2 class="h6 card-title fw-bold" th:text="${tale.title}">عنوان</h2>
                        <p class="small text-muted mb-2">
                            🎙️ <span th:text="${tale.storyteller.displayName}">قصه‌گو</span>
                        </p>
                        <div>
                            <span class="badge text-bg-light border me-1" th:each="cat : ${tale.categories}"
                                  th:text="${cat.name}">دسته</span>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <nav class="mt-5" th:if="${talesPage.totalPages > 1}" aria-label="صفحه‌ها">
        <ul class="pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend="${talesPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/tales(q=${q}, category=${selectedCategory}, page=${talesPage.number - 1})}">قبلی</a>
            </li>

            <li class="page-item" th:if="${pageWindowStart > 0}">
                <a class="page-link" th:href="@{/tales(q=${q}, category=${selectedCategory}, page=0)}"
                   th:text="${@persianDate.digits(1)}">۱</a>
            </li>
            <li class="page-item disabled" th:if="${pageWindowStart > 1}"><span class="page-link">…</span></li>

            <li class="page-item" th:each="i : ${#numbers.sequence(pageWindowStart, pageWindowEnd)}"
                th:classappend="${i == talesPage.number} ? 'active'">
                <a class="page-link" th:href="@{/tales(q=${q}, category=${selectedCategory}, page=${i})}"
                   th:text="${@persianDate.digits(i + 1)}">۱</a>
            </li>

            <li class="page-item disabled" th:if="${pageWindowEnd < talesPage.totalPages - 2}"><span class="page-link">…</span></li>
            <li class="page-item" th:if="${pageWindowEnd < talesPage.totalPages - 1}">
                <a class="page-link"
                   th:href="@{/tales(q=${q}, category=${selectedCategory}, page=${talesPage.totalPages - 1})}"
                   th:text="${@persianDate.digits(talesPage.totalPages)}">آخر</a>
            </li>

            <li class="page-item" th:classappend="${talesPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/tales(q=${q}, category=${selectedCategory}, page=${talesPage.number + 1})}">بعدی</a>
            </li>
        </ul>
    </nav>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
